[workspace]
resolver = "2"
members = [
    "compiler/maat_span",
    "compiler/maat_errors",
    "compiler/maat_lexer",
    "compiler/maat_ast",
    "compiler/maat_parse",
    "compiler/maat_eval",
    "compiler/maat_runtime",
    "compiler/maat_bytecode",
    "compiler/maat_codegen",
    "compiler/maat_vm",
    "compiler/maat_driver",
    "compiler/maat",
    "src/tools/maat-repl",
]

[workspace.package]
version = "0.3.0"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/maatlabs/maat"

[workspace.dependencies]
unicode-xid = "0.2"
